<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JamesGames | Hub</title>
    <style>
        body { background: #0a0a0c; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        #app { width: 400px; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #1a1a1e; border: 1px solid #333; color: white; }
        button { width: 100%; padding: 10px; background: #5b4cf5; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div id="auth-section">
        <h2>JamesGames Login</h2>
        <input type="text" id="username" placeholder="Username (must be unique)">
        <input type="password" id="password" placeholder="Password">
        <button onclick="auth('login')">Login</button>
        <button onclick="auth('register')" style="margin-top:10px; background:#333;">Register</button>
    </div>
    
    <div id="chat-section" style="display:none;">
        <h2 id="welcome-msg"></h2>
        <div id="chat-box" style="height: 300px; overflow-y: scroll; border: 1px solid #333; padding: 10px; margin-bottom: 10px;"></div>
        <input type="text" id="msg-input" placeholder="Type message...">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
    const BASE_URL = "http://127.0.0.1:8090/api/collections";
    
    async function auth(type) {
        const username = document.getElementById('Username').value;
        const password = document.getElementById('password').value;
        const data = type === 'register' 
            ? { Username, password, passwordConfirm: password, email: Username + "@gmail.com }
            : { identity: username, password };

        const path = type === 'register' ? 'users/records' : 'users/auth-with-password';
        
        const res = await fetch(`${BASE_URL}/${path}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('chat-section').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "Welcome, " + username;
            localStorage.setItem('user', username);
            loadMsgs();
        } else {
            const errorData = await res.json();
            console.error("PocketBase Error Details:", errorData);
            alert("Detailed Error: " + JSON.stringify(errorData.data));
        }
    }

    async function sendMsg() {
        const content = document.getElementById('msg-input').value;
        await fetch(`${BASE_URL}/messages/records`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: localStorage.getItem('user'), content })
        });
        document.getElementById('msg-input').value = '';
        loadMsgs();
    }

    async function loadMsgs() {
        const res = await fetch(`${BASE_URL}/messages/records?sort=-created`);
        const data = await res.json();
        document.getElementById('chat-box').innerHTML = data.items.map(i => `<div><b>${i.username}:</b> ${i.content}</div>`).join('');
    }
</script>
</body>
</html>
