<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Mansion | Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at top right, #1a0b2e, #0a0a0a); color: #fff; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        .chat-container { max-width: 800px; margin: 120px auto 40px auto; width: 90%; flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }
        #chat-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; height: 500px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .message { background: rgba(255, 255, 255, 0.05); padding: 10px 15px; border-radius: 10px; border-left: 3px solid #00d4ff; width: fit-content; }
        .message b { color: #00d4ff; }

        .input-area { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 15px; border-radius: 50px; border: none; background: rgba(255,255,255,0.05); color: white; outline: none; border: 1px solid rgba(255,255,255,0.1); }
        .btn { padding: 15px 30px; background: linear-gradient(45deg, #7000ff, #00d4ff); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        nav { position: fixed; width: 100%; display: flex; justify-content: space-between; padding: 25px 10%; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-weight: 700; font-size: 1.5rem; letter-spacing: 3px; }
        .logo span { color: #00d4ff; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">HORROR<span>MANSION</span></div>
    </nav>

    <div class="chat-container">
        <div id="chat-box">
            <div class="message"><b>System:</b> Connection established. Welcome to the Mansion.</div>
        </div>
        <div class="input-area">
            <input type="text" id="username" placeholder="Username">
            <input type="text" id="msg" placeholder="Type a message...">
            <button class="btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
    const chatBox = document.getElementById('chat-box');
    const POCKETBASE_URL = "http://127.0.0.1:8090/api/collections/messages/records";
    async function sendMessage() {
        const user = document.getElementById('username').value || "Anonymous";
        const msg = document.getElementById('msg').value;
        if (!msg) return;

        await fetch(POCKETBASE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, content: msg })
        });

        document.getElementById('msg').value = '';
        fetchMessages();
    }
    async function fetchMessages() {
        const response = await fetch(`${POCKETBASE_URL}?sort=-created&perPage=20`);
        const data = await response.json();
        
        chatBox.innerHTML = '';
        data.items.reverse().forEach(item => {
            const div = document.createElement('div');
            div.className = 'message';
            const text = Math.random() > 0.95 ? "̷̢̛Ģ̷̢Ȩ̷̢Ţ̷̢ ̷̧̢O̷̧̢U̷̧̢Ţ̷̢" : item.content;
            div.innerHTML = `<b>${item.username}:</b> ${text}`;
            chatBox.appendChild(div);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    setInterval(fetchMessages, 2000);
    fetchMessages();

    document.getElementById('msg').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
