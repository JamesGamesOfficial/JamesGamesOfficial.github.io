<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portal | JamesGames</title>
    <!-- Include your shared CSS here -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at top right, #1a0b2e, #0a0a0a); color: #fff; line-height: 1.6; overflow-x: hidden; }

        nav { position: fixed; width: 100%; display: flex; justify-content: space-between; padding: 25px 10%; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-weight: 700; font-size: 1.8rem; letter-spacing: 3px; cursor: pointer; }
        .logo span { color: #00d4ff; }
        .logo2 { font-weight: 700; font-size: 2.8rem; letter-spacing: 3px; cursor: pointer; }
        .logo2 span { color: #00d4ff; }
        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 40px; }
        nav ul li a { text-decoration: none; color: #fff; font-weight: 300; transition: 0.3s; }
        nav ul li a:hover { color: #00d4ff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: 5rem; margin-bottom: 10px; background: linear-gradient(to right, #9d50bb, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        section { padding: 120px 10%; }
        h2 { font-size: 3rem; margin-bottom: 50px; text-align: center; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: auto; }
        .card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s; text-align: center; }
        .card:hover { transform: translateY(-15px); border-color: #00d4ff; background: rgba(255, 255, 255, 0.06); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .btn { display: inline-block; padding: 15px 35px; background: linear-gradient(45deg, #7000ff, #00d4ff); color: white; text-decoration: none; border-radius: 50px; margin-top: 25px; font-weight: bold; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        .member { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; }
        .member h3 { color: #00d4ff; }

        footer { text-align: center; padding: 40px; opacity: 0.5; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">James<span>Games</span></div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="dev-portal.html">Dev Portal</a></li>
        </ul>
    </nav>

    <section style="padding-top: 150px;">
        <h2>Developer Portal</h2>
        <div class="grid">
            <div class="card">
                <h3>Mining Simulator</h3>
                <p>More info coming soon</p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 JamesGames - Managed by James_Does_Stuff & Agent Hamz</p>
    </footer>
    <script>
        function checkLogin() {
            const password = prompt("Enter dev password:");
            if (password !== "your-secret-password") {
                alert("Access Denied");
                window.location.href = "index.html"; // Redirect away if wrong
            }
        }
        // Run this when the page loads
        window.onload = checkLogin;
    </script>

</body>
</html>
