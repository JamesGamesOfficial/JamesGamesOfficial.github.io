html_content = """
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JamesGames | Mining Simulator Clicker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body { 
            background: #121212; 
            color: #e0e0e0; 
            font-family: 'Roboto', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container { text-align: center; max-width: 800px; width: 100%; }
        h1 { color: #bb86fc; }
        .stats { font-size: 1.5em; margin: 20px; padding: 20px; background: #1e1e1e; border-radius: 10px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; }
        button { 
            padding: 15px 25px; font-size: 16px; cursor: pointer; 
            background: #bb86fc; border: none; color: #000; border-radius: 5px; 
            font-weight: bold; margin: 5px; transition: 0.3s;
        }
        button:hover:not(:disabled) { background: #9965f4; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #mine-btn { width: 250px; height: 250px; border-radius: 50%; font-size: 2em; background: #03dac6; border: 8px solid #018786; }
        #mine-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mining Simulator: Web Edition</h1>
        
        <div class="stats">
            <div id="ore-display">Ore: 0</div>
            <div id="mps-display">Ore per second: 0</div>
        </div>

        <button id="mine-btn" onclick="mine()">MINE!</button>

        <div class="game-grid">
            <div class="box">
                <h3>Upgrades</h3>
                <button id="buy-miner" onclick="buyAutoMiner()">Buy Auto-Miner (Cost: 10)</button>
                <button onclick="buyMultiplier()">Buy Multiplier (Cost: 50)</button>
            </div>
            <div class="box">
                <h3>System</h3>
                <button onclick="saveGame()">Save Game</button>
                <button onclick="resetGame()" style="background:#cf6679;">Reset</button>
            </div>
        </div>
    </div>

    <script>
    let game = {
        ore: 0,
        mps: 0,
        minerCost: 10,
        clickValue: 1,
        // Track rare ores
        inventory: { purblu: 0, ruby: 0 }
    };

    function mine() {
        // Add standard ore
        game.ore += game.clickValue;
        
        // 5% chance to find a Rare Ore
        if (Math.random() < 0.05) {
            let rareType = Math.random() < 0.5 ? "purblu" : "ruby";
            game.inventory[rareType] += 1;
            console.log("You found a " + rareType + "!");
        }
        
        updateDisplay();
        triggerShake(); // Visual feedback
    }

    function triggerShake() {
        let btn = document.getElementById("mine-btn");
        btn.classList.add("shake");
        setTimeout(() => btn.classList.remove("shake"), 200);
    }
</script>

<!-- Add this CSS to your <style> block -->
<style>
    @keyframes shake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        50% { transform: translate(-3px, 0px) rotate(2deg); }
        100% { transform: translate(1px, -1px) rotate(-2deg); }
    }
    .shake { animation: shake 0.2s; }
</style>
</body>
</html>
"""

# Save to file
file_path = "mining_simulator_clicker.html"
with open(file_path, "w") as f:
    f.write(html_content)

print(f"File created: {file_path}")
