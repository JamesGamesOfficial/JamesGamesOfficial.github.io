html_content = """
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JamesGames | Mining Simulator Clicker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body { 
            background: #121212; 
            color: #e0e0e0; 
            font-family: 'Roboto', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container { text-align: center; max-width: 800px; width: 100%; }
        h1 { color: #bb86fc; }
        .stats { font-size: 1.5em; margin: 20px; padding: 20px; background: #1e1e1e; border-radius: 10px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; }
        button { 
            padding: 15px 25px; font-size: 16px; cursor: pointer; 
            background: #bb86fc; border: none; color: #000; border-radius: 5px; 
            font-weight: bold; margin: 5px; transition: 0.3s;
        }
        button:hover:not(:disabled) { background: #9965f4; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #mine-btn { width: 250px; height: 250px; border-radius: 50%; font-size: 2em; background: #03dac6; border: 8px solid #018786; }
        #mine-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mining Simulator: Web Edition</h1>
        
        <div class="stats">
            <div id="ore-display">Ore: 0</div>
            <div id="mps-display">Ore per second: 0</div>
        </div>

        <button id="mine-btn" onclick="mine()">MINE!</button>

        <div class="game-grid">
            <div class="box">
                <h3>Upgrades</h3>
                <button id="buy-miner" onclick="buyAutoMiner()">Buy Auto-Miner (Cost: 10)</button>
                <button onclick="buyMultiplier()">Buy Multiplier (Cost: 50)</button>
            </div>
            <div class="box">
                <h3>System</h3>
                <button onclick="saveGame()">Save Game</button>
                <button onclick="resetGame()" style="background:#cf6679;">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let game = {
            ore: 0,
            mps: 0,
            minerCost: 10,
            multiplierCost: 50,
            clickValue: 1
        };

        function mine() {
            game.ore += game.clickValue;
            updateDisplay();
        }

        function buyAutoMiner() {
            if (game.ore >= game.minerCost) {
                game.ore -= game.minerCost;
                game.mps += 1;
                game.minerCost = Math.floor(game.minerCost * 1.5);
                updateDisplay();
                updateButtons();
            }
        }

        function buyMultiplier() {
            if (game.ore >= game.multiplierCost) {
                game.ore -= game.multiplierCost;
                game.clickValue *= 2;
                game.multiplierCost = Math.floor(game.multiplierCost * 2.5);
                updateDisplay();
                updateButtons();
            }
        }

        function updateDisplay() {
            document.getElementById("ore-display").innerText = "Ore: " + Math.floor(game.ore);
            document.getElementById("mps-display").innerText = "Ore per second: " + game.mps;
            updateButtons();
        }
        
        function updateButtons() {
            document.getElementById("buy-miner").innerText = `Buy Auto-Miner (Cost: ${game.minerCost})`;
            document.getElementById("buy-miner").disabled = game.ore < game.minerCost;
        }

        function saveGame() {
            localStorage.setItem('miningSimSave', JSON.stringify(game));
            alert("Game Saved!");
        }

        function loadGame() {
            const savedGame = JSON.parse(localStorage.getItem('miningSimSave'));
            if (savedGame) game = savedGame;
            updateDisplay();
        }

        function resetGame() {
            if(confirm("Are you sure you want to reset?")) {
                localStorage.removeItem('miningSimSave');
                location.reload();
            }
        }

        setInterval(() => {
            game.ore += (game.mps / 10); // Adds Mps every 0.1s for smoothness
            updateDisplay();
        }, 100);

        window.onload = loadGame;
    </script>
</body>
</html>
"""

# Save to file
file_path = "mining_simulator_clicker.html"
with open(file_path, "w") as f:
    f.write(html_content)

print(f"File created: {file_path}")
